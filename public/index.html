<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Manager</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/styles.css?v=28">
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.955 9.955 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
    </div>
    <div class="sidebar-divider"></div>
    <button class="sidebar-btn active" onclick="showPage('connect')" title="Conexoes">
      <svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
    </button>
    <button class="sidebar-btn" onclick="showPage('group')" title="Criar Grupo">
      <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
    </button>
    <button class="sidebar-btn" onclick="showPage('chat')" title="Mensagens" style="position:relative">
      <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
      <span class="sidebar-badge" id="sidebarUnreadBadge" style="display:none"></span>
    </button>
    <button class="sidebar-btn" onclick="showPage('dashboard')" title="Dashboard">
      <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
    </button>
    <div style="flex:1"></div>
    <div class="sidebar-user-wrap" id="sidebarUserWrap">
      <button class="sidebar-btn" id="sidebarUserBtn" onclick="toggleUserMenu()" title="Conta">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
      </button>
      <div class="sidebar-user-menu" id="sidebarUserMenu">
        <button id="menuManageUsers" onclick="openUserManager()" style="display:none">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-7 7v-1c0-2.67 5.33-4 7-4s7 1.33 7 4v1H5zm9.75-9.75l1.41-1.41L13.34 5l-1.41 1.41 2.82 2.84zM17.5 12h2v2h-2v-2zm0-4h2v2h-2V8zm-4 8h2v2h-2v-2z"/></svg>
          Gerenciar usuarios
        </button>
        <button onclick="window.location.href='/auth/logout'">
          <svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          Sair
        </button>
      </div>
    </div>
  </nav>

  <!-- User Manager Modal -->
  <div class="modal-overlay" id="userManagerOverlay" style="display:none" onclick="if(event.target===this)closeUserManager()">
    <div class="modal-box" style="max-width:520px">
      <div class="modal-header">
        <h3>Gerenciar Usuarios</h3>
        <button class="modal-close" onclick="closeUserManager()">&times;</button>
      </div>
      <div class="modal-body" id="userManagerBody">
        <p style="color:#667781;text-align:center;padding:20px">Carregando...</p>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <h1 id="pageTitle">Conexoes</h1>
      <div class="header-spacer"></div>
      <div class="instance-selector" id="instanceSelector" style="display:none">
        <div class="instance-dot" id="selectorDot"></div>
        <select id="instanceSelect" onchange="switchInstance(this.value)"></select>
      </div>
    </div>

    <div class="content">

      <!-- Page: Connect -->
      <div class="page active" id="page-connect">
        <div class="instances-grid" id="instancesGrid">
          <!-- Cards rendered by JS -->
        </div>
      </div>

      <!-- Page: Group -->
      <div class="page" id="page-group">
        <div class="gc">
          <div class="gc-section">
            <div class="gc-avatar-row">
              <div class="gc-avatar" id="groupImagePreview" onclick="document.getElementById('groupImageInput').click()">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#bbb" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </div>
              <input type="file" id="groupImageInput" accept="image/jpeg,image/png" style="display:none" onchange="previewGroupImage(this)">
              <div class="gc-avatar-text">
                <span>Foto do grupo</span>
                <small>Clique para escolher</small>
                <button class="gc-remove-img" id="btnRemoveImg" style="display:none" onclick="removeGroupImage()">Remover</button>
              </div>
            </div>
            <div class="gc-field">
              <label for="groupInstance">Instancia</label>
              <select id="groupInstance"></select>
            </div>
            <div class="gc-field">
              <label for="groupName">Nome do grupo</label>
              <input type="text" id="groupName" placeholder="Ex: Equipe Comercial">
            </div>
            <div class="gc-field">
              <label for="groupDesc">Descricao <span class="gc-opt">opcional</span></label>
              <input type="text" id="groupDesc" placeholder="Do que se trata este grupo?">
            </div>
          </div>

          <div class="gc-section">
            <h3 class="gc-section-title">Participantes</h3>
            <div class="gc-field">
              <label for="participantInput">Numero com DDI</label>
              <div class="gc-add-row">
                <input type="text" id="participantInput" placeholder="5511999999999" onkeydown="if(event.key==='Enter'){event.preventDefault();addParticipant()}">
                <button class="gc-add-btn" onclick="addParticipant()">+</button>
              </div>
            </div>
            <div class="participants-list" id="participantsList"></div>
          </div>

          <div class="gc-section">
            <h3 class="gc-section-title">Mensagem inicial</h3>
            <div class="gc-tabs">
              <button class="gc-tab active" data-type="single" onclick="switchMsgType('single')">Avulsa</button>
              <button class="gc-tab" data-type="pitch" onclick="switchMsgType('pitch')">Pitch</button>
            </div>
            <div id="msgTypeSingle">
              <div class="gc-field">
                <label for="groupFirstMsg">Texto <span class="gc-opt">opcional</span></label>
                <input type="text" id="groupFirstMsg" placeholder="Ex: Oi, tudo bem?" value="Oi">
              </div>
            </div>
            <div id="msgTypePitch" style="display:none">
              <div class="gc-field">
                <label for="pitchSelect">Selecione o pitch</label>
                <select id="pitchSelect" onchange="previewPitch()">
                  <option value="">-- Nenhum --</option>
                </select>
              </div>
              <div class="gc-field">
                <label for="groupConvInstance">Numero conversacional <span class="gc-opt">envia msgs 2+</span></label>
                <select id="groupConvInstance"></select>
              </div>
              <div id="pitchPreview" class="pitch-preview"></div>
            </div>
          </div>

          <div class="gc-submit-section">
            <button class="gc-submit" onclick="createGroup()">Criar grupo e enviar</button>
          </div>
        </div>
      </div>

      <!-- Page: Dashboard -->
      <div class="page" id="page-dashboard">
        <div class="dash-container" id="dashboardContent">
          <div class="dash-empty">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
            <p>Selecione uma instancia conectada para ver o dashboard</p>
          </div>
        </div>
      </div>

      <!-- Page: Chat -->
      <div class="page" id="page-chat">
        <div class="chat-layout">
          <div class="chat-list">
            <div class="chat-list-header" style="display:flex;align-items:center;justify-content:space-between">
              <span>Conversas</span>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="polling-indicator" id="pollingIndicator" style="display:none">
                  <div class="polling-dot"></div> ao vivo
                </div>
                <button class="new-chat-btn" onclick="showNewChatModal()" title="Nova conversa">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
              </div>
            </div>
            <div class="chat-filter-tabs">
              <button class="chat-filter-tab active" data-filter="all" onclick="setChatFilter('all')">Todos <span class="tab-badge" id="tabBadgeAll"></span></button>
              <button class="chat-filter-tab" data-filter="groups" onclick="setChatFilter('groups')">Grupos <span class="tab-badge" id="tabBadgeGroups"></span></button>
              <button class="chat-filter-tab" data-filter="private" onclick="setChatFilter('private')">Conversas <span class="tab-badge" id="tabBadgePrivate"></span></button>
            </div>
            <div class="chat-search">
              <input type="text" class="chat-search-input" id="chatSearchInput" placeholder="Buscar conversas..." oninput="handleChatSearch(this.value)">
            </div>
            <div class="chat-list-body" id="groupList">
              <div class="no-groups">
                <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
                <p>Nenhuma conversa ainda</p>
              </div>
            </div>
            <div class="chat-list-body" id="searchResults" style="display:none"></div>
          </div>
          <div class="chat-messages-area" id="chatArea">
            <div class="empty-chat">
              <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12z"/></svg>
              Selecione uma conversa para ver as mensagens
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/ui.js?v=22"></script>
  <script src="js/instances.js?v=24"></script>
  <script src="js/groups.js?v=21"></script>
  <script src="js/jid-utils.js?v=1"></script>
  <script src="js/chat-core.js?v=21"></script>
  <script src="js/chat-list.js?v=20"></script>
  <script src="js/chat-interactions.js?v=20"></script>
  <script src="js/chat-view.js?v=21"></script>
  <script src="js/chat-send.js?v=20"></script>
  <script src="js/chat-panels.js?v=20"></script>
  <script src="js/chat-graph.js?v=21"></script>
  <script src="js/chat-search.js?v=20"></script>
  <script src="js/chat-ai.js?v=20"></script>
  <script src="js/chat-init.js?v=23"></script>
  <script src="js/dashboard.js?v=20"></script>
</body>
</html>
